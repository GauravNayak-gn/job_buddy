events { worker_connections 1024; }

http {
    upstream auth_service         { server localhost:8001; }
    upstream profile_service      { server localhost:8002; }
    upstream job_service          { server localhost:8003; }
    upstream application_service  { server localhost:8004; }
    upstream chat_service         { server localhost:8005; }
    upstream notification_service { server localhost:8006; }
    upstream matching_service     { server localhost:8007; }

    server {
        listen 80;

        location /api/auth/          { proxy_pass http://auth_service; }
        location /api/profile/       { proxy_pass http://profile_service; }
        location /api/jobs/          { proxy_pass http://job_service; }
        location /api/applications/  { proxy_pass http://application_service; }
        location /api/match/         { proxy_pass http://matching_service; }
        location /api/notifications/ { proxy_pass http://notification_service; }
        location /api/chat/          { proxy_pass http://chat_service; }

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;


        # Add timeouts here to prevent the 504 while debugging
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
