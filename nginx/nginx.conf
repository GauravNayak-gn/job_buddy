events { worker_connections 1024; }

http {
    upstream auth_service         { server localhost:8001; }
    upstream profile_service      { server localhost:8002; }
    upstream job_service          { server localhost:8003; }
    upstream application_service  { server localhost:8004; }
    upstream chat_service         { server localhost:8005; }
    upstream notification_service { server localhost:8006; }
    upstream matching_service     { server localhost:8007; }

    # Map to handle OPTIONS preflight at nginx level
    map $request_method $cors_method {
        OPTIONS  "true";
        default  "";
    }

    server {
        listen 80;

        # ── Global proxy headers ─────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;

        # ── Preflight handler ────────────────────────────────────
        # Handles all OPTIONS requests at nginx, returns 204 with
        # proper CORS headers, so the browser never gets a 502.
        location @cors_preflight {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            add_header Access-Control-Max-Age       "86400" always;
            add_header Content-Length 0 always;
            add_header Content-Type  "text/plain" always;
            return 204;
        }

        location /api/auth/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://auth_service;
        }

        location /api/profile/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://profile_service;
        }

        location /api/jobs/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://job_service;
        }

        location /api/applications/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://application_service;
        }

        location /api/match/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://matching_service;
        }

        location /api/notifications/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://notification_service;
        }

        location /api/chat/ws/ {
            proxy_pass http://chat_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /api/chat/ {
            if ($cors_method = "true") { return 204; }
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
            proxy_pass http://chat_service;
        }
    }
}
